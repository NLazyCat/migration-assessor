[type_mapping]
"string" = "String"
"number" = "i32"
"bigint" = "i64"
"boolean" = "bool"
"any" = "Any"
"void" = "()"
"null" = "None"
"undefined" = "()"
"never" = "!"
"unknown" = "Box<dyn Any>"
"object" = "serde_json::Value"
"Error" = "Box<dyn std::error::Error>"
"Promise<{T}>" = "Result<{T}>"
"Array<{T}>" = "Vec<{T}>"
"Record<string, {T}>" = "HashMap<String, {T}>"
"Map<{K}, {V}>" = "HashMap<{K}, {V}>"
"Set<{T}>" = "HashSet<{T}>"
"Date" = "chrono::DateTime<Utc>"
"Buffer" = "Vec<u8>"
"RegExp" = "regex::Regex"
