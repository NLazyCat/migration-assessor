name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p migration-analyze
      - name: Package
        shell: bash
        run: |
          PKG="migration-analyze-${{ matrix.target }}"
          mkdir -p "$PKG"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/migration-analyze.exe" "$PKG/"
            7z a -tzip "${PKG}.zip" "$PKG"
          else
            cp "target/${{ matrix.target }}/release/migration-analyze" "$PKG/"
            tar czf "${PKG}.tar.gz" "$PKG"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: migration-analyze-*
